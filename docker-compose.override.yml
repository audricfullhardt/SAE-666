# Surcouche dev (fusionnée automatiquement avec docker-compose.yml).
services:
  database:
    ports:
      - "${MYSQL_PORT:-3306}:3306"

  php:
    build:
      target: backend_dev
    environment:
      APP_ENV: dev
    volumes:
      - ./backend:/var/www/backend
      # Recouvre le volume nommé backend_public (prod) qui masquerait
      # sinon public/index.php dans le conteneur.
      - ./backend/public:/var/www/backend/public
      - /var/www/backend/var

  web:
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro
    ports:
      - "${BACKEND_PORT:-8000}:80"

  mercure:
    environment:
      # Dev multi-appareils : on autorise toutes les origines (le front est servi depuis
      # localhost OU depuis l'IP LAN du PC selon l'appareil). En prod, cors_origins reste
      # restreint au domaine (docker-compose.yml).
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
        anonymous
    ports:
      - "${MERCURE_PORT:-3000}:80"

  frontend:
    build:
      target: frontend_dev
    environment:
      VITE_API_PROXY: http://web:80
      # Cible du proxy Vite pour le hub Mercure (service Docker, port interne 80).
      VITE_MERCURE_PROXY: http://mercure:80
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      # Conserve les node_modules (binaires natifs) de l'image.
      - /app/node_modules
