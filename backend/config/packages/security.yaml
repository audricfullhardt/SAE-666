security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/auth/login
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: username
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/game/join, roles: PUBLIC_ACCESS }
        - { path: '^/api/game/[^/]+/ready$', roles: PUBLIC_ACCESS }
        - { path: '^/api/game/[^/]+/return$', roles: PUBLIC_ACCESS }
        - { path: '^/api/game/[^/]+/scan$', roles: PUBLIC_ACCESS }
        - { path: '^/api/game/[^/]+/minigame/current$', roles: PUBLIC_ACCESS }
        - { path: '^/api/game/[^/]+/minigame/result$', roles: PUBLIC_ACCESS }
        - { path: '^/api/game/[^/]+/minigame/tap$', roles: PUBLIC_ACCESS }
        - { path: ^/api/newsletter/subscribe, roles: PUBLIC_ACCESS }
        - { path: ^/api/outlets, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
