# Base (prod). Local : `docker compose up --build` fusionne l'override (dev).
# Prod : `docker compose -f docker-compose.yml --env-file .env.prod up -d --build`.
name: dinoquest

services:
  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql

  php:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: backend_prod
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@database:3306/${MYSQL_DATABASE}?serverVersion=8.0&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
    volumes:
      # Partage public/ (assets + index.php) avec nginx.
      - backend_public:/var/www/backend/public

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - php
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_public:/var/www/backend/public:ro

  mercure:
    image: dunglas/mercure:latest
    restart: unless-stopped
    environment:
      # SERVER_NAME=:80 désactive l'auto-HTTPS de Caddy (TLS géré en amont).
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins ${MERCURE_CORS_ORIGINS}
    volumes:
      - mercure_data:/data
      - mercure_config:/config

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: frontend_prod
    restart: unless-stopped
    depends_on:
      - web
      - mercure
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  database_data:
  backend_public:
  mercure_data:
  mercure_config:
